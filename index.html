    <script>
        // Speech Synthesis Function
        function speakWord(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech to avoid queue buildup
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; // Slightly slower for clear pronunciation
                window.speechSynthesis.speak(utterance);
            } else {
                alert("הדפדפן שלך לא תומך בהשמעה קולית.");
            }
        }

        // Play audio from buttons and stop event propagation (so flashcard doesn't flip)
        function playAudio(event, elementIdOrText, isDirectText = false) {
            event.stopPropagation();
            const text = isDirectText ? elementIdOrText : document.getElementById(elementIdOrText).innerText;
            speakWord(text);
        }

        // Parse Data
        const ALL_WORDS = rawData.trim().split('\n')
            .filter(line => line.includes('|'))
            .map((line, i) => {
                const p = line.split('|');
                return { 
                    id: i, 
                    week: parseInt(p[0].trim()), 
                    en: p[1].trim(), 
                    he: p[2].trim(),
                    example: p[3] ? p[3].trim() : ''
                };
            });

        let state = {
            mode: 'flashcards',
            week: 'all',
            index: 0,
            score: 0,
            flipped: false,
            filteredWords: ALL_WORDS,
            quizOptions: [],
            isAnswerChecked: false
        };

        // --- Init ---
        function init() {
            renderWeekButtons();
            updateView();
        }

        function renderWeekButtons() {
            const container = document.getElementById('week-buttons');
            container.innerHTML = `<button onclick="setWeek('all')" id="btn-week-all" class="px-4 md:px-5 py-2 rounded-full text-xs md:text-sm font-medium transition-colors border bg-blue-600 text-white border-blue-600 shadow-md whitespace-nowrap shrink-0">כל השבועות (${ALL_WORDS.length})</button>`;
            for(let i=1; i<=10; i++) {
                container.innerHTML += `<button onclick="setWeek(${i})" id="btn-week-${i}" class="px-4 md:px-5 py-2 rounded-full text-xs md:text-sm font-medium transition-colors border bg-white text-gray-700 border-gray-200 hover:border-blue-300 hover:bg-blue-50 whitespace-nowrap shrink-0">שבוע ${i}</button>`;
            }
        }

        // --- Navigation ---
        function setMode(newMode) {
            state.mode = newMode;
            state.index = 0;
            state.score = 0;
            state.flipped = false;
            
            // Update Buttons UI
            ['flashcards', 'quiz', 'list'].forEach(m => {
                const btn = document.getElementById(`btn-mode-${m}`);
                if(m === newMode) {
                    btn.className = btn.className.replace('text-gray-600 hover:text-gray-900', 'bg-white shadow-sm text-blue-600');
                } else {
                    btn.className = btn.className.replace('bg-white shadow-sm text-blue-600', 'text-gray-600 hover:text-gray-900');
                }
            });

            updateView();
        }

        function setWeek(newWeek) {
            state.week = newWeek;
            if (newWeek === 'all') state.filteredWords = ALL_WORDS;
            else state.filteredWords = ALL_WORDS.filter(w => w.week === newWeek);
            
            state.index = 0;
            state.score = 0;
            state.flipped = false;

            // Update Buttons UI
            document.querySelectorAll('#week-buttons button').forEach(btn => {
                btn.className = "px-4 md:px-5 py-2 rounded-full text-xs md:text-sm font-medium transition-colors border bg-white text-gray-700 border-gray-200 hover:border-blue-300 hover:bg-blue-50 whitespace-nowrap shrink-0";
            });
            const activeBtn = document.getElementById(`btn-week-${newWeek}`);
            activeBtn.className = "px-4 md:px-5 py-2 rounded-full text-xs md:text-sm font-medium transition-colors border bg-blue-600 text-white border-blue-600 shadow-md whitespace-nowrap shrink-0";

            updateView();
        }

        function updateView() {
            document.getElementById('view-flashcards').classList.add('hidden');
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');
            
            document.getElementById(`view-${state.mode}`).classList.remove('hidden');

            if (state.mode === 'flashcards') renderFlashcards();
            if (state.mode === 'quiz') generateQuiz();
            if (state.mode === 'list') renderList();
        }

        // --- Flashcards ---
        function renderFlashcards() {
            const word = state.filteredWords[state.index];
            document.getElementById('fc-counter').textContent = `כרטיסיה ${state.index + 1} מתוך ${state.filteredWords.length}`;
            document.getElementById('fc-en-text').textContent = word.en;
            document.getElementById('fc-he').textContent = word.he;
            document.getElementById('fc-week').textContent = `שבוע ${word.week}`;
            document.getElementById('fc-example').textContent = word.example;
            
            state.flipped = false;
            document.getElementById('fc-card').classList.remove('rotate-y-180');
        }

        function toggleFlip() {
            state.flipped = !state.flipped;
            if(state.flipped) document.getElementById('fc-card').classList.add('rotate-y-180');
            else document.getElementById('fc-card').classList.remove('rotate-y-180');
        }

        function nextCard() {
            if (state.index < state.filteredWords.length - 1) {
                state.index++;
                renderFlashcards();
            }
        }

        function prevCard() {
            if (state.index > 0) {
                state.index--;
                renderFlashcards();
            }
        }
        
        function restartFC() {
            state.index = 0;
            renderFlashcards();
        }

        // --- Quiz ---
        function generateQuiz() {
            const word = state.filteredWords[state.index];
            const options = [word];
            
            const wrongOptions = ALL_WORDS.filter(w => w.id !== word.id);
            wrongOptions.sort(() => 0.5 - Math.random());
            options.push(wrongOptions[0], wrongOptions[1], wrongOptions[2]);
            options.sort(() => 0.5 - Math.random());
            
            state.quizOptions = options;
            state.isAnswerChecked = false;

            document.getElementById('quiz-en-text').textContent = word.en;
            document.getElementById('quiz-counter').textContent = `שאלה ${state.index + 1} מתוך ${state.filteredWords.length}`;
            document.getElementById('quiz-score').textContent = `ניקוד: ${state.score}`;
            document.getElementById('quiz-next-btn').classList.add('hidden');
            document.getElementById('quiz-summary').classList.add('hidden');

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "p-3 md:p-4 rounded-xl border-2 text-sm md:text-lg font-medium transition-all shadow-sm hover:shadow-md bg-white border-gray-200 hover:border-blue-400 text-gray-700 flex justify-between items-center text-right";
                btn.innerHTML = `<span>${opt.he}</span><span id="quiz-icon-${idx}" class="font-bold mr-2"></span>`;
                btn.onclick = () => selectAnswer(opt, btn, idx);
                optionsContainer.appendChild(btn);
            });
        }

        function selectAnswer(selectedOpt, btnElement, idx) {
            if(state.isAnswerChecked) return;
            state.isAnswerChecked = true;

            const correctWord = state.filteredWords[state.index];
            if(selectedOpt.id === correctWord.id) {
                state.score++;
                document.getElementById('quiz-score').textContent = `ניקוד: ${state.score}`;
            }

            const allBtns = document.getElementById('quiz-options').children;
            state.quizOptions.forEach((opt, i) => {
                const currentBtn = allBtns[i];
                currentBtn.className = "p-3 md:p-4 rounded-xl border-2 text-sm md:text-lg font-medium transition-all shadow-sm flex justify-between items-center text-right ";
                
                if (opt.id === correctWord.id) {
                    currentBtn.className += "bg-green-50 border-green-500 text-green-800";
                    document.getElementById(`quiz-icon-${i}`).textContent = '✓';
                } else if (opt.id === selectedOpt.id) {
                    currentBtn.className += "bg-red-50 border-red-500 text-red-800";
                    document.getElementById(`quiz-icon-${i}`).textContent = '✗';
                } else {
                    currentBtn.className += "bg-gray-50 border-gray-200 text-gray-400 opacity-50";
                }
            });

            if (state.index === state.filteredWords.length - 1) {
                document.getElementById('quiz-summary').classList.remove('hidden');
                document.getElementById('quiz-summary-score').textContent = `הציון שלך: ${state.score} מתוך ${state.filteredWords.length}`;
            } else {
                const nextBtn = document.getElementById('quiz-next-btn');
                nextBtn.classList.remove('hidden');
                nextBtn.textContent = (state.index === state.filteredWords.length - 2) ? 'סיום תרגול' : 'שאלה הבאה';
            }
        }

        function nextQuiz() {
            if (state.index < state.filteredWords.length - 1) {
                state.index++;
                generateQuiz();
            }
        }

        function restartQuiz() {
            state.index = 0;
            state.score = 0;
            generateQuiz();
        }

        // --- List ---
        function renderList() {
            const tbody = document.getElementById('list-body');
            tbody.innerHTML = '';
            state.filteredWords.forEach((word, idx) => {
                // We use a specific ID to extract text for the speech API
                const rowEnId = `list-en-${idx}`;
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50/50 transition-colors border-b border-gray-50 last:border-0">
                        <td class="py-3 px-4 md:py-4 md:px-6 min-w-[200px]" dir="ltr">
                            <div class="flex items-center gap-2 mb-1">
                                <button onclick="playAudio(event, '${rowEnId}', true)" class="p-1.5 bg-gray-100 text-blue-600 rounded-full hover:bg-gray-200 transition-colors shrink-0" title="השמע מילה">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                                </button>
                                <span class="font-bold text-gray-900 text-sm md:text-base break-words" id="${rowEnId}">${word.en}</span>
                            </div>
                            <div class="text-xs md:text-sm text-gray-500 italic ml-8">${word.example}</div>
                        </td>
                        <td class="py-3 px-4 md:py-4 md:px-6 text-gray-700 text-sm md:text-base break-words min-w-[150px] align-top mt-1">${word.he}</td>
                        <td class="py-3 px-4 md:py-4 md:px-6 text-center text-gray-500 text-xs md:text-sm whitespace-nowrap align-top mt-1">${word.week}</td>
                    </tr>
                `;
            });
        }

        // Start
        init();
    </script>
</body>
